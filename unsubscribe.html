<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unsubscribe — ILIRH</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=EB+Garamond:ital,wght@0,400;1,400&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
:root { --navy:#0a1628; --gold:#b8963e; --offwhite:#f7f4ef; --cream:#f0ebe1; --border:#cfc9bc; --text-muted:#5a6a80; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--offwhite); font-family:'EB Garamond',Georgia,serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 16px; }
.box { background:#fff; border-top:4px solid var(--gold); max-width:480px; width:100%; padding:48px 40px; text-align:center; }
.brand { font-family:'Cinzel',serif; font-size:22px; font-weight:700; color:var(--navy); letter-spacing:0.08em; margin-bottom:6px; }
.sub-brand { font-family:'Lato',sans-serif; font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--text-muted); margin-bottom:28px; }
h1 { font-family:'EB Garamond',serif; font-size:24px; font-weight:400; color:var(--navy); margin-bottom:12px; }
p { font-size:16px; color:#2c3e5a; line-height:1.7; margin-bottom:20px; }
.btn { background:var(--navy); color:#fff; border:none; font-family:'Lato',sans-serif; font-size:12px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; padding:12px 28px; cursor:pointer; transition:background 0.2s; }
.btn:hover { background:#1e3a6e; }
.btn-ghost { background:none; border:1px solid var(--border); color:var(--text-muted); margin-top:10px; }
.btn-ghost:hover { border-color:var(--navy); color:var(--navy); }
.msg { display:none; margin-top:20px; padding:12px 16px; font-family:'Lato',sans-serif; font-size:13px; border-radius:0; }
.msg.success { background:#eaf3de; border:1px solid #c0dd97; color:#27500a; }
.msg.error { background:#fdecea; border:1px solid #f5c6c6; color:#a32d2d; }
hr { border:none; border-top:1px solid var(--border); margin:24px 0; }
a.home { font-family:'Lato',sans-serif; font-size:12px; color:var(--text-muted); text-decoration:none; }
a.home:hover { color:var(--navy); }
</style>
</head>
<body>
<div class="box">
  <div class="brand">ILIRH</div>
  <div class="sub-brand">The International Legal Inteligencia Research Herald</div>
  <h1>Unsubscribe from Herald Updates</h1>
  <p id="email-display">Click the button below to remove your email address from our mailing list.</p>
  <button class="btn" id="unsub-btn" onclick="doUnsub()">Confirm Unsubscribe</button>
  <br>
  <button class="btn btn-ghost" onclick="window.location.href='/'">Go Back to Herald</button>
  <div class="msg" id="msg"></div>
  <hr>
  <a href="/" class="home">← Return to ILIRH Herald</a>
</div>

<script>
const SUPABASE_URL = 'https://mhznyfilbpvyaxeofcgn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1oem55ZmlsYnB2eWF4ZW9mY2duIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNzM5NTgsImV4cCI6MjA5NDk0OTk1OH0.HMnfCpOC5XMmhrr5bg4Ov8SZLC8LsAHCPZdj0-7QJCw';

const params = new URLSearchParams(window.location.search);
const email = params.get('email') || '';

if (email) {
  document.getElementById('email-display').textContent =
    `Confirm removal of "${email}" from ILIRH Herald updates.`;
} else {
  document.getElementById('unsub-btn').disabled = true;
  document.getElementById('email-display').textContent = 'No email address found in this link.';
}

async function doUnsub() {
  if (!email) return;
  const btn = document.getElementById('unsub-btn');
  const msg = document.getElementById('msg');
  btn.disabled = true;
  btn.textContent = 'Processing…';
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/subscribers?email=eq.${encodeURIComponent(email)}`,
      {
        method: 'DELETE',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Content-Type': 'application/json'
        }
      }
    );
    if (res.ok) {
      msg.className = 'msg success';
      msg.style.display = 'block';
      msg.textContent = '✓ You have been unsubscribed successfully. You will no longer receive Herald emails.';
      btn.style.display = 'none';
    } else {
      throw new Error('Server returned ' + res.status);
    }
  } catch(e) {
    msg.className = 'msg error';
    msg.style.display = 'block';
    msg.textContent = 'Something went wrong. Please email us at adv.dr.ajaysinghrathore777@gmail.com to unsubscribe.';
    btn.disabled = false;
    btn.textContent = 'Confirm Unsubscribe';
  }
}
</script>
</body>
</html>
